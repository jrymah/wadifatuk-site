<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="500" height="160">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Icon Part -->
  <rect x="0" y="10" width="140" height="140" rx="24" fill="url(#iconBg)"/>
  <!-- Briefcase body -->
  <rect x="28" y="74" width="84" height="56" rx="7" fill="#ffffff" opacity="0.95"/>
  <!-- Handle -->
  <path d="M47 74 L47 58 Q47 50 56 50 L84 50 Q93 50 93 58 L93 74"
        fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <!-- Checkmark -->
  <path d="M42 102 L60 120 L98 82"
        fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Emerald arrow -->
  <circle cx="105" cy="122" r="13" fill="#10b981"/>
  <path d="M105 116 L105 128 M99 122 L111 122" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0"/>
  <path d="M100 127 L105 117 L110 127" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="105" y1="117" x2="105" y2="129" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Text: وظيفتك -->
  <text x="170" y="90" font-family="'Tajawal','Arial',sans-serif" font-size="62" font-weight="900"
