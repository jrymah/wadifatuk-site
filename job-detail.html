  <script>
    // Update breadcrumb + JSON-LD after job loads
    document.addEventListener('jobsDataReady', function() {
      const params = new URLSearchParams(window.location.search);
      const job = getJobById(params.get('id'));
      if (!job) return;

      // Breadcrumb
      const bc = document.getElementById('breadcrumbTitle');
      if (bc) bc.textContent = job.title || job.company;

      // JSON-LD structured data — update dynamically
      const schema = document.getElementById('jobPostingSchema');
      if (schema) {
        const plain = (typeof _stripHtml === 'function') ? _stripHtml(job.description || '') : (job.description || '');
        schema.textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "JobPosting",
          "title": job.title || job.company,
          "description": plain.substring(0, 500),
          "hiringOrganization": {
            "@type": "Organization",
            "name": job.company
          },
          "jobLocation": {
            "@type": "Place",
            "address": {
              "@type": "PostalAddress",
              "addressLocality": job.cityName || '',
              "addressCountry": "SA"
            }
          },
          "employmentType": job.type === 'fulltime' ? 'FULL_TIME' : job.type === 'parttime' ? 'PART_TIME' : 'OTHER',
          "datePosted": job.postedDate || '',
          "validThrough": job.deadline || '',
          "url": window.location.href
        }, null, 2);
      }
    });
  </script>
